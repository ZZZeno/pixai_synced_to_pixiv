<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      max-height: 520px;
      overflow-y: auto;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h2 { font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .queue-count {
      background: #FF6B35;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .subtitle { color: #888; font-size: 12px; margin-bottom: 14px; }

    /* Queue list */
    .queue-list { display: flex; flex-direction: column; gap: 8px; }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 8px;
      transition: border-color 0.2s;
      cursor: grab;
    }
    .queue-item:hover { border-color: #555; }
    .queue-item.dragging { opacity: 0.4; border-color: #0096FA; }
    .queue-item-thumb {
      width: 56px; height: 56px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #111;
    }
    .queue-item-info { flex: 1; min-width: 0; }
    .queue-item-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .queue-item-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .queue-item-remove {
      width: 28px; height: 28px;
      border: none; border-radius: 6px;
      background: transparent; color: #666;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .queue-item-remove:hover { background: #4a1a1a; color: #f44336; }
    .queue-item-order {
      color: #555; font-size: 12px; font-weight: 700;
      flex-shrink: 0; width: 20px; text-align: center;
    }

    /* Actions */
    .actions { margin-top: 14px; display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: opacity 0.2s; text-align: center;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #0096FA, #0062D6);
      color: white;
    }
    .btn-danger { background: #2a1515; color: #f44336; }
    .btn-secondary { background: #333; color: #ccc; }

    /* Empty state */
    .empty {
      text-align: center; padding: 28px 16px;
      background: #1a1a2e; border: 1px solid #333;
      border-radius: 12px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }
    .empty-text { color: #666; font-size: 13px; }
    .empty-sub { color: #444; font-size: 11px; margin-top: 8px; line-height: 1.6; }

    /* Help */
    .help {
      margin-top: 14px; padding: 10px;
      background: #111; border-radius: 8px;
      font-size: 11px; color: #555; line-height: 1.6;
    }
    .help strong { color: #777; }

    /* NSFW badge */
    .badge-nsfw {
      display: inline-block; font-size: 9px; font-weight: 700;
      background: #f44336; color: white; padding: 1px 4px;
      border-radius: 3px; margin-left: 4px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
